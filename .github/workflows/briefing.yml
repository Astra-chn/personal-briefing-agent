name: Personal Briefing

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "daily or weekly"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
  schedule:
    # Beijing time 08:37, UTC 00:37.
    - cron: "37 0 * * *"
    # Beijing time Sunday 20:37, UTC Sunday 12:37.
    - cron: "37 12 * * 0"

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BRIEFING_EMAIL_TO: ${{ secrets.BRIEFING_EMAIL_TO }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main.py --mode "${{ github.event.inputs.mode }}"
          else
            python main.py --mode auto
          fi

      - name: Commit generated briefings
        run: |
          git config user.name "briefing-bot"
          git config user.email "briefing-bot@users.noreply.github.com"
          git add output data
          git commit -m "Update personal briefing" || echo "No changes to commit"
          git push
