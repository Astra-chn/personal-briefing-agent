profile:
  language: zh-CN
  user_goal: "关注 AI 发展、GitHub 热门项目、AI Agent、后端转 AI、公考相关趋势"
  style: "简洁、直接、有判断、有行动建议"

briefing:
  daily_max_items: 12
  weekly_max_items: 25
  include_personal_advice: true
  category_minimums:
    github: 2
    ai_news: 3
    world_news: 2
    china_policy: 2
  category_maximums:
    github: 4
    ai_news: 4
    world_news: 4
    china_policy: 4

history:
  repeat_penalty_days:
    github: 7
    ai_news: 3
    world_news: 3
    china_policy: 3
  repeat_penalty_points:
    github: 1.4
    ai_news: 0.8
    world_news: 0.8
    china_policy: 0.8

llm:
  provider: deepseek
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
  temperature: 0.3
  max_tokens: 4000
  timeout_seconds: 60

github:
  enabled: true
  max_repos: 10
  min_stars: 50
  lookback_days: 14
  fresh_created_days: 30
  repeat_suppression_days: 7
  topics:
    - ai
    - llm
    - agent
    - rag
    - python
    - java
    - backend
    - automation
    - coding-agent
    - mcp
  keywords:
    - AI Agent
    - RAG
    - LLM
    - DeepSeek
    - Claude
    - OpenAI
    - code agent
    - MCP
    - workflow automation

ai_news:
  enabled: true
  max_items: 15
  keywords:
    - OpenAI
    - Anthropic
    - Claude
    - Gemini
    - DeepSeek
    - AI Agent
    - RAG
    - coding agent
    - multimodal
    - open source model
  rss_sources:
    - https://openai.com/news/rss.xml
    - https://www.anthropic.com/news/rss.xml
    - https://huggingface.co/blog/feed.xml

world_news:
  enabled: true
  max_items: 15
  fallback_when_no_keyword_match: true
  fallback_min_items: 5
  keywords:
    - 中美关系
    - 俄乌战争
    - 中东局势
    - 半导体
    - AI监管
    - 全球经济
    - 科技政策
    - US-China
    - China
    - United States
    - Russia
    - Ukraine
    - Middle East
    - Gaza
    - Israel
    - Iran
    - semiconductor
    - chip
    - export controls
    - AI regulation
    - technology policy
    - global economy
    - regulation
    - policy
    - Taiwan
  rss_sources:
    - https://feeds.bbci.co.uk/news/world/rss.xml
    - https://www.aljazeera.com/xml/rss/all.xml
    - https://www.theguardian.com/world/rss
  gdelt_queries:
    - "(US China OR China technology OR semiconductor OR export controls OR AI regulation)"
    - "(Ukraine OR Russia OR Middle East OR Gaza OR Israel OR Iran)"
    - "(global economy OR technology policy OR chip supply chain OR Taiwan)"

china_policy:
  enabled: true
  max_items: 12
  fallback_when_no_keyword_match: true
  keywords:
    - 人工智能
    - 数字经济
    - 数据要素
    - 算力
    - 半导体
    - 新质生产力
    - 科技创新
    - 产业政策
    - 就业
    - 公考
    - 政府工作报告
    - 数字政府
    - 网络安全
    - 数据安全
    - 机器人
  sources:
    - name: 中国政府网
      url: https://www.gov.cn/zhengce/zuixin/
      base_url: https://www.gov.cn
    - name: 国家发展改革委
      url: https://www.ndrc.gov.cn/xwdt/xwfb/
      base_url: https://www.ndrc.gov.cn
    - name: 工业和信息化部
      url: https://www.miit.gov.cn/zwgk/zcwj/index.html
      base_url: https://www.miit.gov.cn
    - name: 科学技术部
      url: https://www.most.gov.cn/kjbgz/
      base_url: https://www.most.gov.cn
    - name: 国家网信办
      url: https://www.cac.gov.cn/zcfg/A0903index_1.htm
      base_url: https://www.cac.gov.cn

scoring:
  relevance_weight: 0.4
  importance_weight: 0.3
  novelty_weight: 0.2
  actionability_weight: 0.1
  min_score: 3.5

output:
  save_markdown: true
  save_html: true
  save_to_sqlite: true
  markdown_dir: output
  database_path: data/briefing.db

delivery:
  email_enabled: true
  streamlit_enabled: true
  attach_markdown: false
